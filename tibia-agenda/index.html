<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agenda de Serviços Rubinot - Panic</title>

  <!-- Biblioteca do calendário -->
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

  <!-- CSS do projeto -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <h1>📅 Agenda de Serviços Rubinot - Panic</h1>
  <div id="mensagem"></div>

  <!-- Login -->
  <div id="loginBox">
    <h3>Login</h3>
    <div id="loginArea">
      <input type="password" id="senha" placeholder="Senha">
      <button id="loginBtn">Entrar</button>
    </div>
    <div id="userArea">
      <span id="usuarioLogado"></span>
      <button id="logoutBtn">Sair</button>
    </div>
  </div>

  <!-- Conteúdo principal -->
  <div id="container">

    <!-- Formulário de agendamento -->
    <form id="formAgendamento">
      <input type="text" id="nome"       placeholder="Seu nome" required>
      <input type="date" id="data"       required>
      <input type="time" id="horaInicio" required>
      <input type="time" id="horaFim"    required>

      <select id="tipo" required>
        <option value="">Selecione o tipo</option>
        <option value="Solo">Solo</option>
        <option value="PT">PT</option>
      </select>

      <select id="hunt" required>
        <option value="">Selecione o hunt</option>
        <option value="RottenBlood">RottenBlood</option>
        <option value="Soulwar">Soulwar</option>
        <option value="Gnomprona">Gnomprona</option>
        <option value="Crypt">Crypt</option>
      </select>

      <select id="vocacao" required>
        <option value="">Selecione a vocação</option>
        <option value="Knight">Knight</option>
        <option value="Paladin">Paladin</option>
        <option value="Sorcerer">Sorcerer</option>
        <option value="Druid">Druid</option>
      </select>

      <button type="submit">Agendar</button>
    </form>

    <div id="calendar"></div>
  </div>

  <!-- JavaScript do projeto (sempre no final do body) -->
  <script src="js/script.js"></script>

</body>
</html>
